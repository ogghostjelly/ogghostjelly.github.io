    <header>
        thoughts I have that I feel the need to externalize.

    <main>
        <ul id="ogj-thoughts">
            Loading...
        </ul>
    </main>
    <style>
        ul {
            padding-left: 0;
        }

        li {
            list-style: none;
            background-color: var(--bg-color);
            border: 2px dotted var(--ternary-color);
            padding: 8px;
            margin: 0;
            line-height: 1em;
        }
    </style>
    <script>
        (()=>{
            function escapeHtml(txt) {
                return txt.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
            }

            function replaceSurrounded(txt, delim, tag, escape=false) {
                delim=delim.replaceAll("*", "\\*")
                let regex = new RegExp(`(?<!\\\\)${delim}.*?${delim}`, "g")
                return txt.replaceAll(regex, (x)=>`<${tag}>${escape ? escapeHtml(x.slice(1,-1)) : x.slice(1,-1)}</${tag}>`)
            }

            function markdownToHtml(txt) {
                txt = replaceSurrounded(txt, '`', "code", true)
                txt = replaceSurrounded(txt, '**', "strong")
                txt = replaceSurrounded(txt, '*', "em")
                txt = replaceSurrounded(txt, '_', "em")
                return txt
            }

            let thoughts = document.getElementById("ogj-thoughts")
            
            fetch("thoughts.txt")
                .then(res => res.text())
                .then(txt => txt.split("\n\n").filter(x=>x.length))
                .then(ls => {
                    thoughts.firstChild.remove()
                    ls.forEach(txt => {
                        let thought = document.createElement("li")
                        thought.innerHTML = markdownToHtml(txt)
                        thoughts.appendChild(thought)
                    })
                })
        })();
    </script>
    <footer>
        thoughts are in <a href="thoughts.txt">a txt file</a> that I edit with <a href="ed.sh">a bash script</a>. the txt file uses \n\n to separate thoughts.
    </footer>
